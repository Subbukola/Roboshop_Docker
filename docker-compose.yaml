services:
  catalogue:
    build: ./catalogue
    image: catalogue:1.0
    container_name: catalogue
    depends_on:
      - mongodb
  
  mongodb:
    build: ./mongodb
    image: mongodb:1.0
    container_name: mongodb

  frontend:
    build: ./frontend
    image: frontend:1.0
    container_name: frontend
    depends_on:
      - catalogue
