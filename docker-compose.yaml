services:
  catalogue:
    build: ./catalogue
    image: catalogue:1.0
    container_name: catalogue
    depends_on:
      - mongodb

  user:
    build: ./user
    image: user:1.0
    container_name: user
    depends_on:
      - mongodb
      - redis

  cart:
    build: ./cart
    image: cart:1.0
    container_name: cart
    depends_on:
      - redis
  
  mongodb:
    build: ./mongodb
    image: mongodb:1.0
    container_name: mongodb

  redis:
    build: ./redis
    image: redis:1.0
    container_name: redis

  

  frontend:
    build: ./frontend
    image: frontend:1.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart

networks:
  default:
    name: roboshop
    driver: bridge
    external: false
      