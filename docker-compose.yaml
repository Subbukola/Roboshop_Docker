services:
  catalogue:
    build: ./catalogue
    image: catalogue:1.0
    container_name: catalogue
    depends_on:
      - mongodb

  user:
    build: ./user
    image: user:1.0
    container_name: user
    depends_on:
      - mongodb
      - redis

  cart:
    build: ./cart
    image: cart:1.0
    container_name: cart
    depends_on:
      - redis
      - catalogue
  
  shipping:
    build: ./shipping
    image: subbukola541/shipping:1.0
    container_name: shipping
    depends_on:
      - mysql
      - cart

  payment:
    build: ./payment
    image: payment:1.0
    container_name: payment
    depends_on:
      - rabbitmq
      - cart
      - user

  
  frontend:
    build: ./frontend
    image: frontend:1.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment

  
  mongodb:
    build: ./mongodb
    image: mongodb:1.0
    container_name: mongodb
    volumes:
      - mongodb:/data/db

  redis:
    #build: ./redis
    image: redis:7.0
    container_name: redis
    volumes:
      - redis:/data

  mysql:
    build: ./mysql
    image: mysql:1.0
    container_name: mysql
    volumes:
      - mysql:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq
    volumes:
      - rabbitmq:/var/lib/rabbitmq

networks:
  default:
    name: roboshop
    driver: bridge
    external: false

volumes:
  mongodb: 
  redis:
  mysql:
  rabbitmq:
      